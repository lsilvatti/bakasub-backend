services:
  backend:
    build:
      context: https://github.com/lsilvatti/bakasub-backend.git#main
    container_name: bakasub_backend
    ports:
      - "8080:8080"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=/app/data/bakasub.db
    volumes:
      - app_data:/app/data
      - ${VIDEO_DIR:-./videos}:/videos
    restart: unless-stopped

  frontend:
    build:
      context: https://github.com/lsilvatti/bakasub-frontend.git#main
      args:
        - VITE_TMDB_API_KEY=${TMDB_API_KEY}
    container_name: bakasub_frontend
    ports:
      - "3000:80" 
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app_data: